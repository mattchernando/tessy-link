# Deploy on Fly.io from this directory:  fly launch --copy-config --now
app = "tessy-link-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  path = "/healthz"
  interval = "30s"
  timeout = "5s"
